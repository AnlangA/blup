name: sandbox-c
description: C compilation and execution sandbox for systems programming exercises
dockerfile: sandboxes/docker/Dockerfile.c
version: 1

base_image:
  name: alpine:3.19
  digest: sha256:placeholder

pinned_packages:
  - gcc
  - musl-dev

build_args:
  USER_ID: "1000"
  USER_NAME: sandbox

security:
  seccomp_profile: sandboxes/policies/seccomp-python.json
  read_only_rootfs: true
  no_new_privileges: true
  cap_drop: ["ALL"]

limits:
  compile_timeout_secs: 20
  run_timeout_secs: 10
  memory_mb: 256
  cpu_count: 1
  disk_mb: 100
  max_processes: 10
  network_enabled: false

tests:
  - name: gcc_version
    command: ["gcc", "--version"]
    expected_output: "gcc"
  - name: compile_and_run
    command: ["sh", "-c", "echo '#include <stdio.h>; int main() { printf(\"hello\\n\"); return 0; }' > /tmp/test.c && gcc /tmp/test.c -o /tmp/test && /tmp/test"]
    expected_output: "hello"
  - name: network_blocked
    command: ["sh", "-c", "timeout 5 wget -q http://example.com 2>/dev/null && echo 'NETWORK_ACCESSIBLE' || echo 'NETWORK_BLOCKED'"]
    expected_output: "NETWORK_BLOCKED"
