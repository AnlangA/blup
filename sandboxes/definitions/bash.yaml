name: sandbox-bash
description: Bash execution sandbox for shell scripting exercises
dockerfile: sandboxes/docker/Dockerfile.bash
version: 1

base_image:
  name: alpine:3.19
  digest: sha256:placeholder

pinned_packages:
  - bash=5.2

build_args:
  USER_ID: "1000"
  USER_NAME: sandbox

security:
  seccomp_profile: sandboxes/policies/seccomp-python.json
  read_only_rootfs: true
  no_new_privileges: true
  cap_drop: ["ALL"]

limits:
  compile_timeout_secs: 0
  run_timeout_secs: 10
  memory_mb: 128
  cpu_count: 1
  disk_mb: 100
  max_processes: 10
  network_enabled: false

tests:
  - name: bash_version
    command: ["bash", "--version"]
    expected_output: "GNU bash"
  - name: basic_execution
    command: ["bash", "-c", "echo hello"]
    expected_output: "hello"
  - name: network_blocked
    command: ["sh", "-c", "timeout 5 wget -q http://example.com 2>/dev/null && echo 'NETWORK_ACCESSIBLE' || echo 'NETWORK_BLOCKED'"]
    expected_output: "NETWORK_BLOCKED"
